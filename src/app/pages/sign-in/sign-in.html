<div class="auth-wrapper">
  <div class="auth-card">

    <div class="brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">Trackr</span>
    </div>

    <div class="landing-buttons">
      <p class="welcome">Welcome! Please sign in or create an account.</p>
      <a routerLink="/sign-up" class="btn-secondary">Create Account</a>
    </div>

    <div class="divider"><span>or sign in</span></div>

    <form (ngSubmit)="onSubmit()" #signinForm="ngForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Enter your username"
          required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          required />
      </div>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="signinForm.invalid" class="btn-primary">
        Sign In
      </button>
    </form>

  </div>
</div>
