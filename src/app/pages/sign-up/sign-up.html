<div class="auth-wrapper">
  <div class="auth-card">

    <div class="brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">Trackr</span>
    </div>

    <h2 class="form-title">Create your account</h2>

    <form (ngSubmit)="onSubmit()" #signupForm="ngForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Choose a username"
          required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="Choose a password"
          required />
      </div>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="signupForm.invalid" class="btn-primary">
        Create Account
      </button>
    </form>

    <p class="switch-link">Already have an account? <a routerLink="/sign-in">Sign In</a></p>

  </div>
</div>
